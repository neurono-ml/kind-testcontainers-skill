name: Kubernetes Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  TESTCONTAINERS_RYUK_DISABLED: "false"
  TESTCONTAINERS_RYUK_PORT: "8080"

jobs:
  test-java:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Java Tests
        run: mvn test -B
        working-directory: src/java

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Docker containers ==="
          docker ps -a
          echo "=== Container logs ==="
          docker logs $(docker ps -q --filter "label=org.testcontainers=true") 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f $(docker ps -aq --filter "label=org.testcontainers=true") 2>/dev/null || true

  test-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Rust Tests
        run: cargo test --test integration
        working-directory: src/rust

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Docker containers ==="
          docker ps -a
          echo "=== Container logs ==="
          docker logs $(docker ps -q --filter "label=org.testcontainers=true") 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f $(docker ps -aq --filter "label=org.testcontainers=true") 2>/dev/null || true

  test-golang:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Go Tests
        run: go test ./... -v -timeout 10m
        working-directory: src/golang

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Docker containers ==="
          docker ps -a
          echo "=== Container logs ==="
          docker logs $(docker ps -q --filter "label=org.testcontainers=true") 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f $(docker ps -aq --filter "label=org.testcontainers=true") 2>/dev/null || true

  test-python:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
        working-directory: src/python

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Python Tests
        run: pytest tests/integration/ -v --timeout=300
        working-directory: src/python

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Docker containers ==="
          docker ps -a
          echo "=== Container logs ==="
          docker logs $(docker ps -q --filter "label=org.testcontainers=true") 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f $(docker ps -aq --filter "label=org.testcontainers=true") 2>/dev/null || true

  test-typescript:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/typescript

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run TypeScript Tests
        run: npm run test:integration
        working-directory: src/typescript

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Docker containers ==="
          docker ps -a
          echo "=== Container logs ==="
          docker logs $(docker ps -q --filter "label=org.testcontainers=true") 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f $(docker ps -aq --filter "label=org.testcontainers=true") 2>/dev/null || true

  cleanup:
    runs-on: ubuntu-latest
    needs: [test-java, test-rust, test-golang, test-python, test-typescript]
    if: always()
    steps:
      - name: Final cleanup
        run: |
          echo "Stopping Ryuk..."
          docker rm -f $(docker ps -q --filter "name=testcontainers-ryuk") 2>/dev/null || true
          
          echo "Removing Kind containers..."
          docker rm -f $(docker ps -q --filter "label=org.testcontainers=true") 2>/dev/null || true
          
          echo "Removing temporary images..."
          docker images --filter "reference=*test*" -q | xargs -r docker rmi -f 2>/dev/null || true
          
          echo "Cleanup complete!"
